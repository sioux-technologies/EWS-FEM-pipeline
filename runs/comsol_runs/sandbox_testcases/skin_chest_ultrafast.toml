[pipeline]
model_name = "breast_model_comsol"
output_subdir = "output_skin_chest_ultrafast"

[comsol]
enabled = true
batch_executable = "C:/Program Files/COMSOL/COMSOL64/Multiphysics/bin/win64/comsolbatch.exe"
comsol_executable = "C:/Program Files/COMSOL/COMSOL64/Multiphysics/bin/win64/comsol.exe"
configuration_dir = "comsol_configuration"
mph_file = ""
study = "std1"
execute = true
auto_build_from_java = true
java_compile_first = true
jdk_root = "C:/Program Files/Eclipse Adoptium/jdk-21.0.10.7-hotspot"
extra_args = []
java_compile_timeout_s = 300
java_build_timeout_s = 0
solve_timeout_s = 0
postprocess_timeout_s = 900
enable_skin_shell_physics = true
enable_skin_solid_coupling_scaffold = true
skin_shell_thickness_m = 0.0001
enable_curved_chestwall = true
chestwall_curve_depth_m = 0.003
compact_output = true

[source]
base_case_toml = "./skin_chest_ultrafast_source.toml"
reuse_febio_prepare = true
export_mesh_npz = true
export_mesh_csv = true
export_lobules_json = true
notes = "Ultra-fast COMSOL debug case for skin-shell and chest-wall inspection without detailed glandular fan geometry."
