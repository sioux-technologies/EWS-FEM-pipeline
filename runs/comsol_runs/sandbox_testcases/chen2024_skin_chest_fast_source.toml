# Fast geometry source case for skin/chest-wall iteration.
# Uses the same general lobe-based concept, but reduces the COMSOL builder detail
# so build-only runs are much faster during shell and chest-wall development.

[model.mesh]
density = 140
debug_view = false

[material.tumor]
tumorous = false

[material.glandular.hetero]
enabled = true
auto_generate = true
generator_mode = "chen_2024_template_lobes"

nipple = [ 0.0, 0.068, 0.0,]

width = 0.0076
amp_c1 = 70.0
amp_c2 = 55.0
amp_rho = 35.0
seed = 42

inner_ring_count = 6
outer_ring_count = 12
inner_ring_radius = 0.0135
outer_ring_radius = 0.0270
inner_depth = 0.030
outer_depth = 0.046
droplet_length = 0.022
hub_offset_y = 0.0125
nipple_clearance_mid = 0.015
nipple_clearance_tip = 0.011
droplet_components = 2

# Fast COMSOL geometry mode: fewer petal segments and duct beads.
comsol_geometry_detail_mode = "fast"
comsol_petal_segments = 4
comsol_duct_beads = 6

[material.adipose.hetero]
enabled = true
radial_center = [ 0.0, 0.0, 0.0,]
radial_L = 0.05
radial_alpha_c1 = 20.0
radial_alpha_c2 = 15.0
radial_alpha_rho = 25.0
