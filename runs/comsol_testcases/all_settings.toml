# COMSOL pipeline settings overview
#
# This file is an annotated template for the main settings that can be passed to
# `python -m ews_fem_pipeline_comsol ... <case.toml>`.
#
# Normal case TOMLs only need to contain the values that differ from the defaults.
# The loader merges missing values with `src/ews_fem_pipeline_comsol/settings.py`.
# For the raw generated defaults, see `all_default_settings.toml`.

[pipeline]
model_name = "breast_model_comsol"
output_subdir = "outputs/output_example_case"

[comsol]
# COMSOL execution and file handling
enabled = true
batch_executable = ""
comsol_executable = ""
configuration_dir = "comsol_configuration"
mph_file = ""
study = "std1"
execute = true
auto_build_from_java = true
reuse_mph_apply_toml_parameters = false
java_compile_first = false
jdk_root = ""
extra_args = [ ]
java_compile_timeout_s = 300
java_build_timeout_s = 1800
solve_timeout_s = 7200
postprocess_timeout_s = 1800

# Optional verification and output-control switches
enable_auxiliary_verification = false
compact_output = false
enable_default_result_plots = true
postprocess_export_plot_images = true
postprocess_save_postprocessed_mph = false
postprocess_mode = "full"
postprocess_quick_mode = false
postprocess_write_auxiliary_mph = false

# Skin representation
enable_skin_shell_physics = false
enable_skin_solid_coupling_scaffold = false
skin_shell_thickness_m = 0.0001
enable_volumetric_skin_layer = false
volumetric_skin_thickness_m = 0.0015

# Posterior support and chestwall curvature
enable_curved_chestwall = false
support_geometry_mode = "auto"
chestwall_curve_depth_m = 0.0007
chestwall_curve_max_depth_ratio = 0.2
chestwall_curve_center_x_offset_m = 0.0
chestwall_curve_max_offset_ratio = 0.75
chestwall_curve_si_depth_m = 0.0
chestwall_alignment_mode = "manual"
chestwall_si_alignment_mode = "global_x"
chestwall_support_mode = "cylinder_band"
chestwall_curve_nipple_follow_factor = 0.0
chestwall_curve_gland_follow_factor = 0.0
transverse_volume_preserve_y_scale = 1.0
transverse_volume_preserve_gland_y_scale = 1.0

# Outer breast shape and nipple placement
outer_shape_scale_x = 1.0
outer_shape_scale_y = 1.0
outer_shape_scale_z = 1.0
outer_inferior_fullness_enabled = false
outer_inferior_fullness_ratio = 0.0
outer_lateral_fullness_enabled = false
outer_lateral_fullness_ratio = 0.0
outer_lateral_fullness_side = 1.0
nipple_surface_offset_factor = 0.18
gland_nipple_surface_offset_factor = 0.16
nipple_surface_anchor_y_m = -1.0
nipple_surface_protrusion_m = -1.0
nipple_surface_overlap_m = -1.0
nipple_surface_center_overlap_m = -1.0
nipple_surface_center_overlap_fraction = -1.0
nipple_geometry_x_offset_m = 0.0
nipple_geometry_z_offset_m = 0.0
nipple_surface_normal_alignment_enabled = false

# Glandular-region alignment and generated lobule helpers
gland_nipple_surface_depth_factor = -1.0
gland_nipple_surface_clearance_fraction = -99.0
gland_subareolar_surface_clearance_m = -1.0
glandular_seed_surface_clearance_fraction = -99.0
debug_show_subareolar_helpers = false
glandular_shape_scale_x = 1.0
glandular_shape_scale_y = 1.0
glandular_shape_scale_z = 1.0
glandular_seed_center_x_offset_m = 0.0
glandular_seed_center_y_offset_m = 0.0
glandular_seed_center_z_offset_m = 0.0
glandular_lobule_include_subareolar_core = false
glandular_lobule_include_subareolar_bridge = false
glandular_lobule_include_reference_ellipsoid = false
glandular_subareolar_core_scale = 1.0
glandular_subareolar_bridge_scale = 1.0

# Posterior support material
chest_density_kg_m3 = 1050.0
chest_youngs_modulus_pa = 10000.0
chest_poissons_ratio = 0.49
enable_split_support_regions = false
upper_support_fraction = 0.6666666666666666
pectoralis_density_kg_m3 = 1050.0
pectoralis_bulk_modulus_pa = 425000.0
pectoralis_coef1_pa = 950.0
pectoralis_coef2_pa = 717.0

# Cooper-like support approximation
enable_cooper_ligament_scaffold = false
cooper_ligament_variant = "none"
cooper_ligament_effective_modulus_pa = 5800000.0
cooper_ligament_reference_length_m = 0.04
cooper_ligament_area_fraction = 0.12
cooper_ligament_tangential_scale = 0.35
cooper_ligament_damping_pa_s_per_m = 0.0

# Dynamic loading
dynamic_motion_mode = "fixed_support_acceleration_pulse"
dynamic_motion_profile = "none"
dynamic_motion_hold_s = 0.25
dynamic_acceleration_amplitude_g = 0.25
dynamic_acceleration_duration_s = 0.60
dynamic_support_displacement_amplitude_m = 0.0
dynamic_support_displacement_duration_s = 0.0
dynamic_mass_damping_alpha_s_inv = 60.0
dynamic_output_step_s = 0.0
dynamic_pulse_output_step_s = 0.005
gravity_ramp_duration_s = 0.0
dynamic_settle_duration_s = 0.0

[source]
# Use either `base_case_toml` or an embedded `[source_case]` block below.
base_case_toml = ""
reuse_source_prepare = true
export_mesh_npz = false
export_mesh_csv = false
export_lobules_json = false
notes = "Annotated settings overview. Copy this file before using it as a real case."

# Important mesh settings!
[source_case.model.mesh]
ls = 0.005
density = 200
optimize = true
debug_view = false
debug_stop_after_mesh = false
order = 2

[source_case.model.geometry]
radius = 0.07
thickness_chest_wall = 0.002
left_relative_position_ellipse = 0.4
right_relative_position_ellipse = 0.05
center_relative_position_ellipse = 0.3
outer_profile_mode = "elliptic"
anterior_projection_scale = 1.08
superior_pole_scale = 0.98
upper_pole_projection_ratio = 0.0
posterior_support_height_scale = 1.0
posterior_curve_depth_ratio = 0.0
pectoralis_support_projection_scale = 0.0
pectoralis_support_shape = "curved_cap"
pectoralis_support_center_ratio = 0.62
pectoralis_support_span_ratio = 0.32
profile_asymmetry_enabled = false
inferior_fullness_ratio = 0.0
superior_flattening_ratio = 0.0
nipple_projection_ratio = 0.0
nipple_transition_height_ratio = 0.06

[source_case.model.geometry.asymmetry]
enabled = false
scale_y = 1.0
scale_z = 1.0

[source_case.material.skin]
density = 1100.0
bulk_modulus = 8333333.0
pressure_model = "default"
coef1 = 41667.0
coef2 = 41667.0

[source_case.material.skin.hetero]
enabled = false

[source_case.material.adipose]
density = 950.0
bulk_modulus = 425000.0
pressure_model = "default"
coef1 = 310.0
coef2 = 300.0

[source_case.material.adipose.hetero]
enabled = false

[source_case.material.glandular]
density = 1070.0
bulk_modulus = 425000.0
pressure_model = "default"
coef1 = 833.0
coef2 = 833.0

[source_case.material.glandular.hetero]
enabled = false
lobules = [ ]
radial_center = [ ]
radial_L = 0.055
radial_alpha_c1 = 0.0
radial_alpha_c2 = 0.0
radial_alpha_rho = 0.0
auto_generate = false
generator_mode = "chen_2024_template_lobes"
comsol_geometry_detail_mode = "fast"
comsol_petal_segments = 3
comsol_duct_beads = 0
comsol_duct_style = "ellipsoid_segments"
comsol_duct_segments = 4
comsol_duct_radius_scale = 1.25
n_lobes = 12
n_per_lobe = 3
nipple = [ 0.0, 0.068, 0.0 ]
lobe_length = 0.045
spread_angle = 1.1
width = 0.0084
amp_c1 = 70.0
amp_c2 = 55.0
amp_rho = 35.0
seed = 42
inner_ring_count = 4
outer_ring_count = 8
inner_ring_radius = 0.0125
outer_ring_radius = 0.025
inner_depth = 0.0215
outer_depth = 0.035
droplet_length = 0.034
droplet_components = 2
hub_offset_y = 0.0032
nipple_clearance_mid = 0.0032
nipple_clearance_tip = 0.0008
chestwall_aware_lobules = true
chestwall_reference_radius_m = 0.1306
chestwall_curve_depth_m = 0.021
chestwall_curve_center_x_offset_m = 0.055
chestwall_clearance_m = 0.0035
chestwall_posterior_margin_scale = 2.9

[source_case.material.pectoralis]
density = 1050.0
bulk_modulus = 425000.0
pressure_model = "default"
coef1 = 950.0
coef2 = 717.0

[source_case.material.pectoralis.hetero]
enabled = false

[source_case.material.tumor]
tumorous = false
density = 1079.0
radius = 0.006
position = [ 0.025, 0.056, 0.018 ]
youngs_modulus_pa = 100000.0
coef1 = 8333.3333333333
coef2 = 8333.3333333333
coef1_adipose = 8333.3333333333
coef2_adipose = 8333.3333333333
coef1_glandular = 8333.3333333333
coef2_glandular = 8333.3333333333

[source_case.simulation.control_step1]
time_steps = 10
step_size = 0.1

[source_case.simulation.control_step2]
time_steps = 120
step_size = 0.01

[source_case.simulation.gravity]
n_steps = 10

[source_case.simulation.parabolic_jump]
max_height = 0.01
n_steps = 51

[source_case.simulation.animation]
fps = 40
dtmax = 0.01

[source_case.simulation.output]
output_to_vtk = true
output_displacement = true
output_stress = true
output_relative_volume = true
